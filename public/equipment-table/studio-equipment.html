<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Studio Vybavení</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&display=swap');
:root{--bg:transparent;--sur:rgba(7,6,10,.58);--sur2:rgba(26,23,16,.68);--panel:rgba(7,6,10,.58);--panel-soft:rgba(7,6,10,.5);--panel-strong:rgba(7,6,10,.66);--brd:rgba(201,185,154,.18);--acc:#c8a96e;--acc2:#e0c080;--txt:#e8e4dd;--mut:#64615d;--chip:rgba(18,18,22,.58)}
*{margin:0;padding:0;box-sizing:border-box}
html{height:100%;background:transparent}
body{height:100%;display:flex;flex-direction:column;background:var(--bg);color:var(--txt);font-family:-apple-system,'Segoe UI',system-ui,sans-serif;overflow:hidden}
#hdr{flex-shrink:0;height:42px;display:flex;align-items:center;gap:12px;padding:0 18px;border-bottom:1px solid var(--brd);background:var(--sur)}
#hdr h1{font-size:15px;font-weight:400;letter-spacing:3px;text-transform:uppercase;color:var(--acc);font-family:'Cormorant Garamond',serif}
#hdr span{font-size:10px;color:var(--mut);letter-spacing:2px;text-transform:uppercase;border-left:1px solid var(--brd);padding-left:14px}
#tabs{flex-shrink:0;min-height:30px;display:flex;align-items:stretch;border-bottom:1px solid var(--brd);background:var(--sur);overflow-x:auto;flex-wrap:nowrap}
#tabs::-webkit-scrollbar{height:2px}
#tabs::-webkit-scrollbar-thumb{background:var(--brd)}
.tb{font-size:9px;font-weight:500;letter-spacing:1px;text-transform:uppercase;color:var(--mut);background:none;border:none;border-bottom:2px solid transparent;padding:0 8px;cursor:pointer;white-space:nowrap;display:flex;align-items:center;gap:5px;transition:color .15s}
.tb:hover{color:var(--txt)}
.tb.on{color:var(--acc);border-bottom-color:var(--acc)}
.tb em{background:rgba(30,30,32,.72);color:var(--mut);font-style:normal;font-size:9px;padding:1px 5px;border-radius:0}
.tb.on em{background:#29210e;color:var(--acc)}
#main{flex:1;display:grid;grid-template-columns:270px 1fr;min-height:0}
#list{border-right:1px solid var(--brd);overflow-y:auto;background:var(--panel)}
#list::-webkit-scrollbar{width:3px}
#list::-webkit-scrollbar-thumb{background:var(--brd)}
.sec{display:none}
.sec.on{display:block}
.row{display:flex;align-items:flex-start;gap:9px;padding:4px 16px;border-bottom:1px solid #141416;cursor:pointer;transition:background .12s;font-size:12px;color:#c4c1bb;line-height:1.25}
.row:hover{background:var(--sur2)}
.row.sel{background:rgba(30,26,16,.76);border-left:2px solid var(--acc);padding-left:14px;color:var(--acc2)}
.ico{display:none}
#det{overflow-y:auto;padding:16px 28px;background:var(--panel)}
#det::-webkit-scrollbar{width:3px}
#det::-webkit-scrollbar-thumb{background:var(--brd)}
#empty{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;gap:10px;opacity:.15}
#empty .ei{font-size:52px}
#empty p{font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--mut)}
#dc{display:none}
#dc.on{display:flex;flex-direction:column;min-height:100%;animation:fi .2s ease}
@keyframes fi{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:translateY(0)}}
.clbl{font-size:9px;letter-spacing:2px;text-transform:uppercase;color:var(--acc);margin-bottom:4px}
.dtit{font-size:28px;font-weight:300;color:var(--txt);line-height:1.12;margin-bottom:8px;padding-bottom:0;border-bottom:none;font-family:'Cormorant Garamond',serif;letter-spacing:0.3px}
.dtit-sub{font-size:11px;font-weight:400;color:var(--mut);letter-spacing:0.5px;margin-top:5px;line-height:1.4}
.blk{margin-bottom:12px}
.blbl{font-size:9px;letter-spacing:2px;text-transform:uppercase;color:var(--mut);margin-bottom:8px;display:flex;align-items:center;gap:8px}
.blbl::after{content:"";flex:1;height:1px;background:var(--brd)}
.btxt{font-size:13px;line-height:1.45;color:#a8a5a0;white-space:pre-line}
.upgrade-txt{color:#b8a878;font-size:12px}
.forsale-inline{display:inline-block;margin-left:10px;padding:2px 8px;background:#0d1a0d;border:1px solid rgba(100,180,100,0.35);border-radius:4px;color:#7ec87e;text-decoration:none;font-size:11px;font-weight:500;letter-spacing:0.3px;vertical-align:middle;white-space:nowrap}
.forsale-inline:hover{color:#a8e0a8;border-color:rgba(100,180,100,0.6)}
.chain-link{color:var(--acc);cursor:pointer;border-bottom:1px solid rgba(200,169,110,0.35);transition:color .15s}
.chain-link:hover{color:var(--acc2);border-bottom-color:rgba(224,192,128,0.6)}
.chips{display:flex;flex-wrap:wrap;gap:5px}
.chip{background:var(--chip);border:1px solid var(--brd);border-radius:0;padding:3px 9px;font-size:11px;color:#908d88}
/* Video cards */
.vcards{display:flex;flex-direction:column;gap:10px;margin-bottom:18px}
.vcard{border:none;border-radius:0;overflow:hidden;background:var(--panel);margin-bottom:2px}
.vcard-top{display:flex;align-items:center;justify-content:space-between;padding:8px 12px;border-bottom:1px solid var(--brd)}
.vcard-title{font-size:12px;font-weight:600;color:#d4a84b}
.vcard-link{font-size:11px;color:var(--acc);text-decoration:none}
.vcard-link:hover{text-decoration:underline}
.vcard-ctp{position:relative;cursor:pointer;overflow:hidden;height:auto;aspect-ratio:16/9;background:var(--panel-strong)}
.ctp-overlay{position:absolute;inset:0;background:rgba(0,0,0,0.35);transition:background .2s}
.vcard-ctp:hover .ctp-overlay{background:rgba(0,0,0,0.15)}
.ctp-play{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;pointer-events:none}
.ctp-play span{width:58px;height:58px;background:rgba(0,0,0,.75);border:2px solid rgba(255,255,255,.6);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:22px;color:#fff;padding-left:5px;transition:transform .2s,background .2s,border-color .2s}
.vcard-ctp:hover .ctp-play span{transform:scale(1.12);background:rgba(200,169,110,.88);border-color:transparent}
.vcard-embed{position:relative;padding-bottom:56.25%;height:0;overflow:hidden}
.vcard-embed iframe{position:absolute;top:0;left:0;width:100%;height:100%;border:0}
.vcard-below{padding:8px 12px;font-size:10px;line-height:1.5;color:#a8a090;white-space:normal;background:var(--panel)}
/* Image slide arrow */
.img-slide{position:relative;display:inline-block;width:100%}
.slide-arrow{position:absolute;right:14px;top:50%;transform:translateY(-50%);width:36px;height:36px;border-radius:50%;background:rgba(0,0,0,0.55);border:1px solid rgba(255,255,255,0.18);color:rgba(255,255,255,0.7);font-size:22px;line-height:1;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background .2s,color .2s,border-color .2s;z-index:10;padding:0}
.slide-arrow:hover{background:rgba(200,169,110,0.75);border-color:transparent;color:#fff}
#mesa-slide-img{transition:opacity .18s ease}
.row-thumb{width:38px;height:38px;flex-shrink:0;border-radius:0;overflow:hidden;background:rgba(26,26,28,.72);border:1px solid var(--brd)}
.row-thumb img{width:100%;height:100%;object-fit:cover;display:block;filter:saturate(0.6)}
.row.sel .row-thumb img{filter:saturate(1)}
.drum-img{margin-top:18px;margin-bottom:0;border-radius:0;overflow:hidden}
.drum-img img{width:100%;display:block}
.hydropower-logo{margin-top:22px;text-align:center;position:relative;cursor:pointer}
.hydropower-logo img{max-width:320px;width:100%;border-radius:0;opacity:0.92;display:block;margin:0 auto;border:1px solid rgba(255,255,255,0.18)}
.zoom-photo{margin-top:20px;border-radius:0;overflow:hidden;cursor:zoom-in}
.zoom-inner{overflow:hidden}
.zoom-inner img{width:100%;display:block;transition:transform .6s cubic-bezier(.25,.46,.45,.94);transform-origin:center center}
.zoom-photo:hover .zoom-inner img{transform:scale(1.09)}
/* Crop top dark strip on Fender Telecaster Deluxe 1973 photo */
.tele73-crop .zoom-inner{aspect-ratio:16/9;}
.tele73-crop .zoom-inner img{width:100%;height:100%;object-fit:cover;object-position:50% 24%;}
.src{margin-top:auto;padding-top:10px;border-top:1px solid var(--brd);font-size:10px;color:var(--mut)}
/* Accordion */
.acc-cat{border-bottom:1px solid #181819}
.acc-hdr{display:flex;align-items:center;gap:8px;padding:7px 16px;cursor:pointer;font-size:11px;font-weight:600;letter-spacing:0.3px;color:#9a9794;transition:background .12s,color .12s;user-select:none;position:relative}
.acc-hdr:hover{background:var(--sur2);color:var(--txt)}
.acc-hdr.open{color:var(--acc);background:rgba(14,13,9,.72)}
.acc-ico{font-size:13px;flex-shrink:0}
.acc-lbl{flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.acc-arr{font-size:14px;color:var(--mut);transition:transform .18s;flex-shrink:0;line-height:1}
.acc-hdr.open .acc-arr{transform:rotate(90deg);color:var(--acc)}
.acc-body{overflow:hidden}
.acc-body .row{padding-left:28px;font-size:11px;color:#8a8784;border-bottom:1px solid #101012}
.acc-body .row:hover{background:rgba(17,17,16,.72);color:#bbb}
.acc-body .row.sel{background:rgba(18,15,5,.76);border-left:2px solid var(--acc);padding-left:26px;color:var(--acc2)}
.sub-hdr{padding:6px 16px 4px;font-size:10px;font-weight:700;letter-spacing:0.8px;text-transform:uppercase;color:#5a5752;border-top:1px solid #1a1918;margin-top:2px;user-select:none}
.sub-hdr:first-child{border-top:none;margin-top:0}
/* Apollo X8P special panel */
.apollo-main{display:block;padding:10px 14px 12px;background:rgba(15,14,11,.72);border-bottom:1px solid #1a1918;cursor:pointer;border-left:2px solid transparent;transition:background .12s}
.apollo-main:hover{background:rgba(20,18,16,.76)}
.apollo-main.sel{background:rgba(24,21,16,.8);border-left-color:var(--acc)}
.apollo-main-name{font-size:11.5px;font-weight:700;color:#d4c89a;letter-spacing:0.2px;line-height:1.2;margin-bottom:4px}
.apollo-desc{font-size:10px;color:#5a5752;line-height:1.4;margin-bottom:6px}
.apollo-hl{font-size:9.5px;color:#4a4744;line-height:1.6}
.apollo-sub{padding:5px 14px 5px 28px;font-size:11px;color:#706d6a;border-bottom:1px solid #101012;display:flex;align-items:center;gap:6px;cursor:pointer;transition:background .12s,color .12s}
.apollo-sub:hover{background:var(--sur2);color:#a8a5a0}
.apollo-sub.sel{background:rgba(26,24,14,.76);color:var(--acc2);border-left:2px solid var(--acc);padding-left:26px}
/* Apollo detail highlights */
.hl-card{background:rgba(15,14,11,.72);border:1px solid #252523;border-radius:0;padding:10px 14px;display:flex;align-items:flex-start;gap:12px;margin-bottom:8px}
.hl-icon{font-size:18px;flex-shrink:0;line-height:1.2}
.hl-title{font-size:12px;font-weight:600;color:#d4c89a;margin-bottom:2px}
.hl-sub{font-size:11px;color:#7a7774}
/* Portrait / mobile responsive */
@media (orientation: portrait) {
  body{height:auto;min-height:100vh;overflow-y:auto;overflow-x:hidden}
  #main{display:flex;flex-direction:column;overflow:visible;min-height:auto}
  #list{border-right:none;border-bottom:1px solid var(--brd);overflow-y:auto;max-height:30vh;flex-shrink:0}
  #det{overflow-y:visible;flex:1;min-height:50vh}
  #hdr{padding:0 12px;height:38px}
  #hdr h1{font-size:13px;letter-spacing:2.4px}
  .tb{font-size:9px;padding:0 6px}
  #tabs{min-height:28px}
  #det{padding:14px 12px}
  .dtit{font-size:20px}
  .row{padding:4px 12px;font-size:11px}
  .acc-body .row{padding-left:20px;font-size:10px}
  .acc-body .row.sel{padding-left:18px}
  .sub-hdr{padding:5px 12px 3px}
  .row.sel{padding-left:10px}
  .blbl{font-size:8px}
  .btxt{font-size:12px}
  .zoom-photo{margin-top:14px}
}
</style>
</head>
<body>

<div id="main">
<div id="list"></div>
<div id="det">
<div id="empty"><div class="ei">🎸</div><p>Vyberte položku ze seznamu</p></div>
<div id="dc"></div>
</div>
</div>

By": ["Les Claypool (Primus)", "Tim Commerford (Rage Against the Machine / Audioslave)", "Flea (Red Hot Chili Peppers)", "Robert Trujillo (Metallica)"], "src": "boss.info"}, "TC Electronic Plethora X5 (Looper/Effect)": {"img":"plethora","tech": "TonePrint multi-efektová deska. 5 simultánních efektových slotů. 6minutový stereo looper. Bluetooth editace.", "usedBy": ["Paul Gilbert (Mr. Big / solo)", "Guthrie Govan (The Aristocrats)", "Vernon Reid (Living Colour)"], "src": "tcelectronic.com"}, "EBow Plus": {"tech": "Elektronický smyčec – elektromagnetická vibrace rozehraje strunu bez fyzického dotyku. Napodobuje smyčcové nebo dechové nástroje. 2 režimy: normal + harmonic.", "videos": [{"title": "EBow – U2 – 'Where The Streets Have No Name' & technique demo", "link": "https://www.youtube.com/watch?v=5cnIQHJ169s", "thumb": "https://i.ytimg.com/vi/5cnIQHJ169s/hqdefault.jpg", "below": "Ukázka EBow techniky na kytaře – sustain, smyčcový efekt, harmonics."}], "usedBy": ["The Edge (U2)", "Peter Buck (R.E.M.)", "Robert Smith (The Cure)", "Jonny Greenwood (Radiohead)"], "src": "ebow.com, equipboard.com"}, "G-LAB TBWP True Bypass Wah Pad (2x)": {"tech": "True bypass switching unit pro wah pedály. Eliminuje koloring tónu při bypassed wah. Relay switching, LED indikátor. (2× ks)", "src": "g-lab.pl"}, "Strymon Zuma (3x)": {"tech": "Pedálový napájecí zdroj. 9 izolovaných výstupů: 9V/12V/18V, 500 mA/port. (3× ks = 27 plně izolovaných výstupů v sestavě.)", "usedBy": ["John Mayer (solo)"], "src": "strymon.net"}, "Lexicon MPX 200": {"tech": "Stereo multi-efektový procesor. 240 presetů + 200 uživatelských. Efekty: reverb, delay, chorus, flanger, pitch shift, rotary. 24-bit A/D-D/A. S/PDIF digitální I/O. XLR + jack vstupy/výstupy.", "usedBy": ["Radiohead (studiové nahrávky)", "Trent Reznor (Nine Inch Nails)"], "forsale": "https://hudebnibazar.cz/lexicon-mpx-200/ID596984/", "src": "lexicon.com"}, "Mapex Saturn V MH Exotic (Bicí souprava)": {"tech": "Souprava Mapex Saturn V MH Exotic. Shell function toggleAcc(hdr){
  const isOpen=hdr.classList.contains('open');
  hdr.classList.toggle('open',!isOpen);
  const body=hdr.nextElementSibling;
  if(body) body.style.display=isOpen?'none':'block';
  if(!isOpen){
    const firstRow=body.querySelector('.row[data-uad]');
    if(firstRow){
      document.querySelectorAll('.row[data-uad]').forEach(r=>r.classList.remove('sel'));
      firstRow.classList.add('sel');
      showUAD(firstRow.dataset.uad);
    }
  }
}

function build(){
  const tabs=document.getElementById('tabs');
  const list=document.getElementById('list');
  CATS.forEach(cat=>{
    const btn=document.createElement('button');
    btn.className='tb'+(cat.id===activeTab?' on':'');
    btn.dataset.id=cat.id;
    btn.innerHTML=cat.label;
    btn.onclick=()=>switchTab(cat.id);
    tabs.appendChild(btn);

    const sec=document.createElement('div');
    sec.className='sec'+(cat.id===activeTab?' on':'');
    sec.id='sec-'+cat.id;

    if(cat.accordion){
      // Render UAD accordion
      UAD_PLUGIN_CATS.forEach((uc,uidx)=>{
        const isFirst=uidx===0;
        const catDiv=document.createElement('div');
        catDiv.className='acc-cat';
        const hdr=document.createElement('div');
        hdr.className='acc-hdr'+(isFirst?' open':'');
        hdr.innerHTML='<span class="acc-lbl">'+esc(uc.label)+'</span><span class="acc-arr">›</span>';
        hdr.onclick=()=>toggleAcc(hdr);
        catDiv.appendChild(hdr);
        const body=document.createElement('div');
        body.className='acc-body';
        if(!isFirst) body.style.display='none';
        uc.plugins.forEach((pname,pidx)=>{
          const row=document.createElement('div');
          row.className='row'+(isFirst&&pidx===0?' sel':'');
          row.dataset.uad=pname;
          row.textContent=pname;
          body.appendChild(row);
        });
        catDiv.appendChild(body);
        sec.appendChild(catDiv);
      });
    } else if(cat.apolloItem){
      const ai=cat.apolloItem;
      const mainRow=document.createElement('div');
      mainRow.className='row apollo-main';
      mainRow.dataset.apollo='main';
      mainRow.innerHTML=
        '<div class="apollo-main-name">'+esc(ai.name)+'</div>';
      mainRow.onclick=()=>showApolloView('main');
      sec.appendChild(mainRow);
      ai.subTabs.forEach(st=>{
        const subRow=document.createElement('div');
        subRow.className='row apollo-sub';
        subRow.dataset.apollo=st.id;
        subRow.textContent=st.label;
        subRow.onclick=()=>showApolloView(st.id);
        sec.appendChild(subRow);
      });
    } else if(cat.subgroups){
      cat.subgroups.forEach(sg=>{
        const shdr=document.createElement('div');
        shdr.className='sub-hdr';
        shdr.textContent=sg.label;
        sec.appendChild(shdr);
        sg.items.forEach(name=>{
          const row=document.createElement('div');
          row.className='row';
          row.dataset.n=name;
          row.innerHTML=name.replace(/\s*\([^)]*\bwith\b[^)]*\)/gi,'');
          row.onclick=()=>show(name,cat.label);
          sec.appendChild(row);
        });
      });
    } else {
      cat.items.forEach(name=>{
        const row=document.createElement('div');
        row.className='row';
        row.dataset.n=name;
        row.innerHTML=name.replace(/\s*\([^)]*\bwith\b[^)]*\)/gi,'');
        row.onclick=()=>show(name,cat.label);
        sec.appendChild(row);
      });
    }
    list.appendChild(sec);
  });
  // Event delegation for UAD plugin rows
  list.addEventListener('click',function(e){
    const row=e.target.closest('.row[data-uad]');
    if(row) showUAD(row.dataset.uad);
  });
}

function switchTab(id){
  activeTab=id;
  document.querySelectorAll('.tb').forEach(b=>b.classList.toggle('on',b.dataset.id===id));
  document.querySelectorAll('.sec').forEach(s=>s.classList.toggle('on',s.id==='sec-'+id));
  document.querySelectorAll('.row').forEach(r=>r.classList.remove('sel'));
  const cat=CATS.find(c=>c.id===id);
  if(cat&&cat.accordion){
    // Auto-load first UAD plugin
    const firstPlugin=UAD_PLUGIN_CATS[0].plugins[0];
    showUAD(firstPlugin);
    const firstRow=document.querySelector('#sec-pl .row[data-uad]');
    if(firstRow) firstRow.classList.add('sel');
  } else if(cat&&cat.apolloItem){
    showApolloView('main');
  } else if(cat&&cat.subgroups&&cat.subgroups[0].items.length){
    show(cat.subgroups[0].items[0],cat.label);
  } else if(cat&&cat.items&&cat.items.length){
    show(cat.items[0],cat.label);
  } else {
    document.getElementById('empty').style.display='flex';
    document.getElementById('dc').className='';
  }
}

function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

function linkAnteater(s){
  return s.replace(/\bAnteater\b/g,'<a href="https://www.anteaterofficial.com/" target="_blank" style="color:#d4a84b;text-decoration:none;border-bottom:1px solid rgba(212,168,75,0.35)">Anteater</a>');
}

function linkItems(s){
  // Map of display text in chains → full item key in D
  // Keys are what appears in escaped HTML (esc() was already called on below text)
  // Values are exact keys in D{} object
  const ALIASES=[
    ['Fender Jaguar Kurt Cobain','Fender Jaguar Kurt Cobain (2011) (with Graph Tech Bridge Saddles)'],
    ['Fender Custom Shop LTD 67 HSS Strat AB HR','Fender Custom Shop - LTD 67 HSS Strat AB HR'],
    ['Fender Custom Shop LTD 67 HSS Strat','Fender Custom Shop - LTD 67 HSS Strat AB HR'],
    ['Fender 1995 Precision Bass PB-STD','Fender 1995 Precision Bass PB-STD'],
    ['Squier short scale bass','Squier short scale bass'],
    ['Tone Wheel','Tone Wheel (Salvation Audio)'],
    ['Digitech Whammy IV','Digitech Whammy IV'],
    ['Strymon Timeline','Strymon Timeline'],
    ['Strymon Zuma','Strymon Zuma (3x)'],
    ['Dunlop MXR MICRO AMP','Dunlop MXR MICRO AMP'],
    ['D&amp;M Drive','D&amp;M Drive'],
    ['AMPEG V-4B Bass Head','AMPEG V-4B Bass Head'],
    ['Ampeg V-4B','AMPEG V-4B Bass Head'],
    ['KHDK Abyss','KHDK Abyss'],
    ['Mogami Platinum','Mogami Platinum'],
    ['Marshall AFD 100','Marshall AFD 100'],
    ['Marshall 1960 BX','Marshall 1960 BX'],
    ['Ampeg SVT-112AV Cabinet','Ampeg SVT-112AV Cabinet'],
    ['Fender 64 Custom Deluxe Reverb','Fender 64 Custom Deluxe Reverb'],
  ];
  const escR=t=>t.replace(/[.*+?^${}()|[\]\\]/g,'\\$&');
  let out=s;
  ALIASES.forEach(([alias,itemKey])=>{
    // D keys use & not &amp;
    const realKey=itemKey.replace(/&amp;/g,'&');
    if(!D[realKey]) return;
    const re=new RegExp(alias.replace(/[.*+?^${}()|[\]\\]/g,'\\$&'),'g');
    const safeKey=realKey.replace(/&/g,'&amp;').replace(/"/g,'&quot;');
    out=out.replace(re,'<span class="chain-link" data-item="'+safeKey+'" onclick="doLink(this)">'+alias+'</span>');
  });
  return out;
}

function doLink(el){
  const name=el.dataset.item;
  let cat=CATS.find(c=>c.items&&c.items.includes(name));
  if(!cat) cat=CATS.find(c=>c.subgroups&&c.subgroups.some(sg=>sg.items.includes(name)));
  if(cat){
    switchTab(cat.id);
    setTimeout(()=>show(name,cat.label),10);
  }
}

function renderBelow(s){
  return linkItems(linkAnteater(s));
}

function pinSourceBottom(){
  const dc=document.getElementById('dc');
  if(!dc) return;
  const src=dc.querySelector('.src');
  if(src) dc.appendChild(src);
}

function show(name,catLabel){
  document.querySelectorAll('.row').forEach(r=>r.classList.toggle('sel',r.dataset.n===name));
  const d=D[name]||{};

  // Split name: "Main Name (Upgrade/note)" → title + subtitle
  // Skip year-only parens like (1967), (1964-65), (3x), (Snare 14"×8")
  const parenMatch = name.match(/^(.+?)\s+\(([^)]{8,})\)\s*$/);
  const isYear = parenMatch && /^\d{4}(-\d{2,4})?$/.test(parenMatch[2]);
  const isShort = parenMatch && parenMatch[2].length < 8;
  const mainName = (parenMatch && !isYear && !isShort) ? parenMatch[1] : name;
  const subName  = (parenMatch && !isYear && !isShort) ? parenMatch[2] : null;

  let h='';
  h+='<div class="dtit">'+esc(mainName);
  if(d.forsale) h+=' <a class="forsale-inline" href="'+esc(d.forsale)+'" target="_blank">🏷 Na prodej</a>';
  if(subName) h+='<div class="dtit-sub">'+esc(subName)+'</div>';
  h+='</div>';
  if(d.tech) h+='<div class="blk"><div class="blbl">Technické specifikace</div><div class="btxt">'+esc(d.tech)+'</div></div>';
  if(d.upgrade) h+='<div class="blk"><div class="blbl">Upgrade</div><div class="btxt upgrade-txt">'+esc(d.upgrade)+'</div></div>';
  if(d.usedBy&&d.usedBy.length&&activeTab!=='sw'){
    h+='<div class="blk"><div class="blbl">Používají / používali také</div><div class="chips">';
    d.usedBy.forEach(a=>{h+='<span class="chip">'+esc(a)+'</span>';});
    h+='</div></div>';
  }
  if(d.note){
    const hasAnteaterVid=d.videos&&d.videos.some(v=>(v.title||'').includes('Anteater'));
    h+='<div class="blk"><div class="blbl">Poznámka</div><div class="btxt">'+linkAnteater(esc(d.note));
    if(hasAnteaterVid) h+='<div style="margin-top:8px;font-size:11px;color:#8a8580;font-style:italic">Kompletní chain, který v klipu slyšíte, je k dispozici ve studiu.</div>';
    h+='</div></div>';
  }


  if(d.videos&&d.videos.length){
    h+='<div class="vcards">';
    d.videos.forEach(v=>{
      const link=v.link||'';
      const below=v.below||'';
      const vidMatch=link.match(/[?&]v=([^&]+)/);
      const vidId=vidMatch?vidMatch[1]:null;
      h+='<div class="vcard">';
      if(vidId){
        const bgStyle='background-image:url(https://i.ytimg.com/vi/'+vidId+'/maxresdefault.jpg),url(https://i.ytimg.com/vi/'+vidId+'/mqdefault.jpg);background-size:cover;background-position:center top';
        h+='<div class="vcard-ctp" data-vid="'+esc(vidId)+'" style="'+bgStyle+'">';
        h+='<div class="ctp-overlay"></div>';
        h+='<div class="ctp-play"><span>▶</span></div>';
        h+='</div>';
      }
      if(below) h+='<div class="vcard-below">'+renderBelow(esc(below))+'</div>';
      h+='</div>';
    });
    h+='</div>';
  }

  if(!d.tech&&!d.note&&!d.usedBy&&!d.videos&&!d.img) h+='<div class="btxt" style="color:var(--mut);font-style:italic">Podrobné informace nejsou k dispozici.</div>';
  if(d.src) {
    const srcLinks = d.src.split(',').map(s=>{
      const t=s.trim();
      if(t.startsWith('http')) return '<a href="'+t+'" target="_blank" style="color:var(--mut);text-decoration:none;border-bottom:1px solid rgba(100,97,93,0.3)">'+t.replace('https://','')+'</a>';
      // Auto-detect domain and linkify
      const domains={
        'equipboard.com':'https://equipboard.com',
        'fender.com':'https://www.fender.com',
        'mesaboogie.com':'https://www.mesaboogie.com',
        'marshall.com':'https://www.marshall.com',
        'strymon.net':'https://www.strymon.net',
        'uaudio.com':'https://www.uaudio.com',
        'shure.com':'https://www.shure.com'
      };
      const url=domains[t];
      return url ? '<a href="'+url+'" target="_blank" style="color:var(--mut);text-decoration:none;border-bottom:1px solid rgba(100,97,93,0.3)">'+t+'</a>' : esc(t);
    });
    h+='<div class="src">Zdroj: '+srcLinks.join(', ')+'</div>';
  }

  const dc=document.getElementById('dc');

  // Ghost background items (img behind text)
  const GHOST_IMGS={
    pbass95:    {src:PBASS95_IMG, pos:'right:-60px;top:-60px;height:130%;width:auto',        grad:'100deg,#0a0a0c 38%,rgba(10,10,12,0.82) 58%,rgba(10,10,12,0.22) 100%', op:'0.13', sat:'0.3'},
    tama_snare: {src:TAMA_IMG,    pos:'right:-100px;bottom:-80px;height:95%;width:auto',     grad:'100deg,#0a0a0c 28%,rgba(10,10,12,0.72) 50%,rgba(10,10,12,0.08) 100%', op:'0.28', sat:'0.2'},
  };

  // Zoom photo items (displayed below text)
  const ZOOM_IMGS={
    drums:true, tele73:true, martin:true, fender64:true,
    mesarect:true, plasma:true, apollo:true, timeline:true, dimebag:true,
    sm7b:true, flint:true, wahrack:true, microamp:true, marshall_afd:true,
    light_pedal:true, rotovibe:true, sphere_dlx:true, hydropower:'logo',
    dt770:true, mackie_thump:true, finalcut:true, logicpro:true, apple_xdr:true,
    ampeg_reverbrocket:true,
    maybach_teleman:true,
    plethora:true,
    khdk_abyss:true
  };

  if(d.img==='jeffbeck_slide'){
    h+='<div class="img-slide" id="jb-slide">'+
       '<div class="zoom-photo"><div class="zoom-inner"><img src="'+JEFFBECK_FRONT_IMG+'" id="jb-slide-img" alt="Fender Custom Shop Jeff Beck" /></div></div>'+
       '<button class="slide-arrow" id="jb-arrow" onclick="jbSlide()">›</button>'+
       '</div>';
    dc.innerHTML=h;
    window._jbIdx=0;
    window.jbSlide=function(){
      const imgs=[JEFFBECK_FRONT_IMG,JEFFBECK_BACK_IMG,JEFFBECK_THIRD_IMG];
      window._jbIdx=(window._jbIdx+1)%imgs.length;
      const el=document.getElementById('jb-slide-img');
      if(el){el.style.opacity='0';setTimeout(()=>{el.src=imgs[window._jbIdx];el.style.opacity='1';},180);}
    };
  } else if(d.img==='mapex_tabs'){
    h+='<div class="mtabs"><button class="mtab on" onclick="mTab(this,\'mapex\')">📷 Fotografie</button><button class="mtab" onclick="mTab(this,\'drums\')">📐 Schéma sestavy</button></div>'+
       '<div id="mpanel-mapex" class="zoom-photo"><div class="zoom-inner"><img src="'+MAPEX_IMG+'" alt="Mapex Saturn V" style="opacity:0.72;filter:saturate(0.8)" /></div></div>'+
       '<div id="mpanel-drums" class="drum-img" style="display:none"><img src="'+DRUMS_IMG+'" alt="Schéma sestave" /></div>';
    dc.innerHTML=h;
  } else if(d.img==='mesa_tabs'){
    const mesaPanels=['front','back'];
    let mesaIdx=0;
    h+='<div class="img-slide" id="mesa-slide">'+
       '<div class="zoom-photo"><div class="zoom-inner"><img src="'+MESA_FRONT_IMG+'" id="mesa-slide-img" alt="Mesa Boogie Dual Rectifier" /></div></div>'+
       '<button class="slide-arrow" id="mesa-arrow" onclick="mesaSlide()">›</button>'+
       '</div>';
    dc.innerHTML=h;
    window._mesaIdx=0;
    window.mesaSlide=function(){
      window._mesaIdx=window._mesaIdx===0?1:0;
      const imgs=[MESA_FRONT_IMG,MESA_BACK_IMG];
      const el=document.getElementById('mesa-slide-img');
      const arrow=document.getElementById('mesa-arrow');
      if(el){el.style.opacity='0';setTimeout(()=>{el.src=imgs[window._mesaIdx];el.style.opacity='1';},180);}
      if(arrow) arrow.textContent=window._mesaIdx===0?'›':'‹';
    };
  } else if(GHOST_IMGS[d.img]){
    const g=GHOST_IMGS[d.img];
    dc.innerHTML=
      '<div style="position:relative;overflow:hidden;margin:-28px -36px;padding:28px 36px;min-height:100%;">'+
        '<img src="'+g.src+'" style="position:absolute;'+g.pos+';opacity:'+g.op+';pointer-events:none;z-index:0;filter:saturate('+g.sat+') contrast(1.1);" />'+
        '<div style="position:absolute;inset:0;background:linear-gradient('+g.grad+');z-index:1;pointer-events:none;"></div>'+
        '<div style="position:relative;z-index:2;">'+h+'</div>'+
      '</div>';
  } else {
    if(ZOOM_IMGS[d.img]){
      const src=IMGS[d.img];
      if(d.img==='drums'){
        h+='<div class="drum-img"><img src="'+src+'" alt="'+esc(name)+'" /></div>';
      } else if(ZOOM_IMGS[d.img]==='logo'){
        h+='<div class="hydropower-logo" id="hp-wrap">'+
          '<video id="hp-video" src="'+IMGS.hydropower_mp4+'" muted playsinline style="width:100%;border-radius:0;margin:0 auto;border:1px solid rgba(255,255,255,0.18)"></video>'+
          '</div>';
      } else {
        const wrapClass=d.img==='tele73'?'zoom-photo tele73-crop':'zoom-photo';
        const wrapStyle=name==='Apple Pro XDR 6K monitor pro color-accurate editing'?' style="margin-top:8px"':'';
        h+='<div class="'+wrapClass+'"'+wrapStyle+'><div class="zoom-inner"><img src="'+src+'" alt="'+esc(name)+'" /></div></div>';
      }
    }
    dc.innerHTML=h;
  }
  pinSourceBottom();
  // Hydropower hover video
  const hpWrap=document.getElementById('hp-wrap');
  if(hpWrap){
    const vid=document.getElementById('hp-video');
    hpWrap.addEventListener('mouseenter',()=>{
      if(vid && vid.paused) vid.play().catch(()=>{});
    });
  }
  document.getElementById('empty').style.display='none';
  dc.className='on';
  if(window.matchMedia('(orientation:portrait)').matches) setTimeout(()=>document.getElementById('det').scrollIntoView({behavior:'smooth',block:'start'}),50);
}

build();

if(_firstCat&&_firstCat.subgroups&&_firstCat.subgroups[0].items.length) show(_firstCat.subgroups[0].items[0],_firstCat.label);
else if(_firstCat&&_firstCat.items&&_firstCat.items.length) show(_firstCat.items[0],_firstCat.label);

document.getElementById('det').addEventListener('click', function(e){
  const ctp=e.target.closest('.vcard-ctp');
  if(ctp && !ctp.querySelector('iframe')){
    const vid=ctp.dataset.vid;
    if(vid){
      ctp.innerHTML='<div class="vcard-embed" style="position:relative;padding-bottom:56.25%;height:0"><iframe src="https://www.youtube.com/embed/'+vid+'?autoplay=1&rel=0" frameborder="0" allow="accelerometer;autoplay;clipboard-write;encrypted-media;gyroscope;picture-in-picture" allowfullscreen style="position:absolute;top:0;left:0;width:100%;height:100%"></iframe></div>';
    }
  }
});
